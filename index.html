<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kannan Narayanaswamy</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Source Serif 4', serif;
            background: #f8f7f4;
            color: #1a1a1a;
            margin: 0;
            line-height: 1.75;
        }
        .page {
            max-width: 760px;
            margin: 48px auto;
            padding: 48px 44px;
            background: white;
            border: 0.5px solid #ddd;
        }
        .nav {
            display: flex;
            justify-content: flex-end;
            gap: 28px;
            margin-bottom: 48px;
            padding-bottom: 16px;
            border-bottom: 0.5px solid #e0ddd8;
        }
        .nav a {
            font-size: 15px;
            color: #444;
            text-decoration: none;
            letter-spacing: 0.01em;
        }
        .nav a:hover {
            color: #1b5e55;
            text-decoration: underline;
        }
        .profile {
            display: flex;
            gap: 40px;
            align-items: flex-start;
        }
        .photo img {
            width: 200px;
            display: block;
        }
        .bio h1 {
            font-size: 24px;
            font-weight: 500;
            margin: 0 0 18px 0;
            color: #1a1a1a;
        }
        .bio p {
            font-size: 16px;
            color: #333;
            margin: 0 0 14px 0;
            line-height: 1.8;
        }
        .email {
            margin-top: 20px;
            font-size: 15px;
            color: #555;
        }
        .email a {
            color: #1b5e55;
            text-decoration: none;
        }
        .email a:hover {
            text-decoration: underline;
        }
        @media (max-width: 580px) {
            .profile { flex-direction: column; }
            .photo img { width: 160px; }
            .page { padding: 32px 20px; }
        }
    </style>
</head>
